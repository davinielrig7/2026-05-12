<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="atividade01.style.css">
</head>
<body>
    <form id="formulario">
        <label for="nome" >Nome completo:</label>
        <input type="text" id="nome">

        <label for="email">Email:</label>
        <input type="text" id="email">

        <label for="senha">Senha:</label>
        <input type="password" id="senha">

        <label for="idade">Idade</label>
        <input type="text" id="idade">

        <label for="nascimento">Nascimento</label>
        <input id="nascimento" type="date"/>


        <div>
            <label>Genero:</label>
            <label><input type="radio" name="genero" value="masculino" required>Masculino</label>

            <label><input   type="radio" name="genero" value="feminino"> Feminino</label>

            <label><input type="radio" name="genero" value="outros">Outros</label>
        </div>

        <label>Turno</label>
        <label><input type="checkbox" name="turno" value="matutino">Matutino</label>

        <label><input type="checkbox" name="turno" value="vespertino" >Vespertino</label>

        <label><input type="checkbox" name="turno" value="noturno">Noturno</label>

        <label for="CorFavorita">Cor de destaque</label>
        <input id="corFavorita" type="color"/>

        <button id="btnEnviar" type="submit">Enviar</button>

    </form>


    <script src="atividade01.html.js"></script>


</body>
</html>
